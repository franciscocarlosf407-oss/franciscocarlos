<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francisco Carlos - Portfólio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">Francisco Carlos</div>
            <ul class="nav-links">
                <li><a href="#sobre">Sobre mim</a></li>
                <li><a href="#projetos">Projetos</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle">☀️</button>
        </nav>
    </header>
    <section id="sobre" class="hero-section">
        <div class="hero-container">
            <div class="profile-image">
                <img src="foto-perfil.jpg.jpeg" alt="Foto de Francisco Carlos">
            </div>
            <div class="hero-content">
                <h1>Olá, eu sou <span class="highlight">Francisco Carlos</span></h1>
                <p class="description">
                    Graduando do curso de tecnologia em sistemas para Internet, 
                    buscando sempre alcançar novos patamares!
                </p>
                <div class="social-links">
                    <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="social-btn"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </div>
    </section>

    <section id="projetos" class="projects-section">
        <h2 class="section-title">Meus Projetos <span class="sparkle">✨</span></h2>
        <div class="projects-container" id="projectsContainer">
            <!-- Projetos serão renderizados via JavaScript -->
        </div>
    </section>
    <footer class="footer">
        <p>&copy; 2026 Francisco Carlos. Todos os direitos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
